# RAG4All SaaS — pull-only deploy from Docker Hub (no source build).
# Copy this folder to your server, configure .env, then:
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb -p local/documents || true &&
      exit 0
      "

  api:
    image: ${DOCKERHUB_USER}/rag4all-api:${RAG4ALL_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEPLOYMENT_MODE: multi_tenant
      DATABASE_URL: postgresql+asyncpg://rag:${POSTGRES_PASSWORD:-rag}@postgres:5432/rag
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker:
    image: ${DOCKERHUB_USER}/rag4all-api:${RAG4ALL_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEPLOYMENT_MODE: multi_tenant
      DATABASE_URL: postgresql+asyncpg://rag:${POSTGRES_PASSWORD:-rag}@postgres:5432/rag
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_started
    command: arq app.workers.WorkerSettings

  platform-ui:
    image: ${DOCKERHUB_USER}/rag4all-platform-ui:${RAG4ALL_VERSION:-latest}
    restart: unless-stopped
    environment:
      API_PUBLIC_URL: ${API_PUBLIC_URL}
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - platform-ui

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
