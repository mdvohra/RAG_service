# RAG4All SaaS — Render FREE tier (demo / trial only)
#
# ⚠️  LIMITATIONS — read deploy/saas/FREE-DEPLOY.md before using
#   • Postgres FREE expires after ~30 days
#   • Web services sleep after 15 min idle (cold start ~1 min)
#   • Only 750 free instance-hours/month total
#   • No background worker service — API runs worker in same container
#   • No MinIO on Render — use Cloudflare R2 free tier (manual env)
#   • No Render Redis — use Upstash Redis free tier (manual env)
#
# Blueprint path: deploy/saas/render-free.yaml
# For production use render.yaml (paid) or a free VM — see FREE-DEPLOY.md

databases:
  - name: rag4all-db
    databaseName: rag4all
    user: rag4all
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: rag4all-api
    runtime: image
    plan: free
    image:
      url: docker.io/mohds5252/rag4all-api:latest
    healthCheckPath: /v1/health
    dockerCommand: >-
      sh -c 'export DATABASE_URL="$$(echo "$$DATABASE_URL" | sed "s|^postgresql://|postgresql+asyncpg://|")";
      alembic upgrade head &&
      python -m app.scripts.seed &&
      arq app.workers.WorkerSettings &
      uvicorn app.main:app --host 0.0.0.0 --port $${PORT:-8000}'
    envVars:
      - fromGroup: rag4all-backend
      - key: DATABASE_URL
        fromDatabase:
          name: rag4all-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false

  - type: web
    name: rag4all-platform-ui
    runtime: image
    plan: free
    image:
      url: docker.io/mohds5252/rag4all-platform-ui:latest
    healthCheckPath: /
    dockerCommand: >-
      sh -c 'sed -i "s/listen 80/listen $$PORT/" /etc/nginx/conf.d/default.conf &&
      /docker-entrypoint.sh'
    envVars:
      - key: API_PUBLIC_URL
        sync: false

envVarGroups:
  - name: rag4all-backend
    envVars:
      - key: DEPLOYMENT_MODE
        value: multi_tenant
      - key: SITE_URL_ALLOW_LOCALHOST
        value: "false"
      - key: MINIO_BUCKET
        value: documents
      - key: MINIO_SECURE
        value: "true"
      - key: LLM_PROVIDER
        value: openai
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SUPER_ADMIN_API_KEY
        generateValue: true
      - key: PLATFORM_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: SITE_URL
        sync: false
