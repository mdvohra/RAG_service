# RAG4All — single-tenant local stack (pre-built images from Docker Hub)
#
# Quick start:
#   cp .env.example .env
#   docker compose pull
#   docker compose up -d
#
# Images: https://hub.docker.com/u/mohds5252

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb -p local/documents || true &&
      exit 0
      "

  api:
    image: mohds5252/rag4all-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEPLOYMENT_MODE: single_tenant
      DATABASE_URL: postgresql+asyncpg://rag:${POSTGRES_PASSWORD:-rag}@postgres:5432/rag
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      SITE_URL_ALLOW_LOCALHOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker:
    image: mohds5252/rag4all-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEPLOYMENT_MODE: single_tenant
      DATABASE_URL: postgresql+asyncpg://rag:${POSTGRES_PASSWORD:-rag}@postgres:5432/rag
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: arq app.workers.WorkerSettings

  setup-wizard:
    image: mohds5252/rag4all-setup-wizard:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-http://localhost:8090}
      SAMPLE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      WIDGET_KEY: ${WIDGET_KEY}
      API_KEY: ${API_KEY}
    depends_on:
      api:
        condition: service_healthy

  admin-ui:
    image: mohds5252/rag4all-admin-ui:latest
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:

configs:
  postgres_init:
    content: |
      CREATE EXTENSION IF NOT EXISTS vector;
      CREATE EXTENSION IF NOT EXISTS pg_trgm;
