services:
  api:
    restart: unless-stopped
    environment:
      SITE_URL_ALLOW_LOCALHOST: "false"
    deploy:
      resources:
        limits:
          memory: 2G

  worker:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - setup-wizard

volumes:
  caddy_data:
  caddy_config:
